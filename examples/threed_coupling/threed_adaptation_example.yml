version: 1
workflow: pipeline

paths:
  root: .
  zerod_config: ../../data/zerod_config.json
  clinical_targets: ../../data/clinical_targets.csv
  mesh_surfaces: ../../data/mesh-surfaces
  preop_dir: preop
  postop_dir: postop
  adapted_dir: adapted
  optimized_params: optimized_params.csv

bcs:
  type: impedance
  compliance_model: constant
  is_pulmonary: true

adaptation:
  method: cwss
  location: uniform
  iterations: 10

pipeline:
  run_steady: true
  optimize_bcs: true
  run_threed: true
  adapt: true

threed:
  mesh_scale_factor: 1.0
  convert_to_cm: false
  solver_paths:
    svpre: svpre
    svsolver: svsolver
    svpost: postsolver
